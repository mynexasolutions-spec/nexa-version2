<section class="contact-section" id="contact">
  <div class="contact-wrap">
    <div class="contact-left reveal">
      <div class="sec-eyebrow">Get In Touch</div>
      <h2>Let's Build Something Great Together</h2>
      <p>Tell us about your project and we'll get back to you within 24 hours. No fluff, no commitment â€” just a real conversation about what's possible.</p>
      <div class="contact-info">
        <div class="c-info-item">
          <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          hello@nexasolutions.io
        </div>
        <div class="c-info-item">
          <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.38 2 2 0 0 1 3.58 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 6.29 6.29l.72-.83a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          +1 (800) 555-NEXA
        </div>
        <div class="c-info-item">
          <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          San Francisco, CA &middot; New York, NY
        </div>
      </div>
    </div>
    <form class="contact-form reveal" data-delay="150" id="contactForm" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label for="cf-name">Your Name</label>
          <input type="text" id="cf-name" name="name" placeholder="Alex Johnson" autocomplete="name" required>
        </div>
        <div class="form-group">
          <label for="cf-email">Email Address</label>
          <input type="email" id="cf-email" name="email" placeholder="alex@company.com" autocomplete="email" required>
        </div>
      </div>
      <div class="form-group">
        <label for="cf-service">Service Interested In</label>
        <select id="cf-service" name="service">
          <option value="" disabled selected>Select a service&hellip;</option>
          <option value="web">Web Development</option>
          <option value="mobile">Mobile App</option>
          <option value="ai">AI Solutions</option>
          <option value="analytics">Data Analytics</option>
          <option value="seo">SEO &amp; Growth</option>
          <option value="automation">Automation</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="cf-message">Tell Us About Your Project</label>
        <textarea id="cf-message" name="message" placeholder="Describe your project goals, timeline, and any specific requirements&hellip;" required></textarea>
      </div>
      <button type="submit" class="contact-submit">
        Send Message
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </form>
  </div>
</section>
