{% extends "layouts/base_admin.html" %}

{% block content %}
<div class="admin-container">

  <h1>Dashboard</h1>

  <div class="dashboard-stats">
    <div class="stat-card">
      <h3>Total Blogs</h3>
      <p>{{ blog_count }}</p>
    </div>
    <div class="stat-card">
      <h3>Categories</h3>
      <p>{{ category_count }}</p>
    </div>
  </div>

  <div class="dashboard-actions">
    <a href="{{ url_for('admin.blog_list') }}" class="btn-primary">Manage Blogs</a>
    <a href="{{ url_for('admin.manage_categories') }}" class="btn-secondary">Manage Categories</a>
    <a href="{{ url_for('admin.logout') }}" class="btn-danger">Logout</a>
  </div>

</div>
{% endblock %}
