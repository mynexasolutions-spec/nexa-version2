<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    
    <style>
  :root {
    --admin-blue: #4D7CFE;
    --admin-dark: #0B1C3D;
    --bg-gray: #f8f9fc;
  }
  body { 
    font-family: 'DM Sans', sans-serif; 
    background-color: var(--bg-gray); 
    margin: 0; 
    color: #333;
  }
  .admin-nav {
    background: var(--admin-dark);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .admin-nav a { color: white; text-decoration: none; font-weight: 600; margin-right: 20px; }
  
  .admin-container {
    max-width: 1100px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
  }
  
  .admin-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
  }

  /* Table Styling */
  .admin-table {
    width: 100%;
    border-collapse: collapse;
  }
  .admin-table th {
    text-align: left;
    padding: 12px;
    background: #f1f4f9;
    color: #555;
    text-transform: uppercase;
    font-size: 0.8rem;
    letter-spacing: 1px;
  }
  .admin-table td { padding: 15px 12px; border-bottom: 1px solid #eee; }
  
  /* Button Styling */
  .btn-primary {
    background: var(--admin-blue);
    color: white;
    padding: 10px 20px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 600;
    transition: 0.2s;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  
  .badge {
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: bold;
  }
  .published { background: #e6fffa; color: #2d3748; border: 1px solid #b2f5ea; }

  .admin-wrapper {
    padding: 20px;
    margin-top: 20px;
    min-height: 80vh;
  }

  /* Add this to prevent Quill from breaking the layout */
  .form-group {
      margin-bottom: 25px;
      display: flex;
      flex-direction: column;
  }
</style>
</head>
<body>
    <nav class="admin-nav"> <a href="{{ url_for('admin.dashboard') }}">Dashboard</a>
        <a href="/">View Site</a>
    </nav>
    
    <div class="admin-wrapper">
        {% block content %}{% endblock %}
        
    </div>

    {% block scripts %}{% endblock %}
</body>


</html>
